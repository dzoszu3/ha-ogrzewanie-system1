# Input Numbers - Suwaki Kontrolne dla Ogrzewania
# Plik: /config/input_number.yaml

# SALON
input_number_salon_temp_night:
  name: "Salon - Temperatura Noc"
  unit_of_measurement: "°C"
  min: 18
  max: 30
  step: 0.5
  icon: mdi:thermometer
  mode: slider
  restore: true

input_number_salon_temp_day:
  name: "Salon - Temperatura Dzień"
  unit_of_measurement: "°C"
  min: 18
  max: 30
  step: 0.5
  icon: mdi:thermometer
  mode: slider
  restore: true

input_number_salon_hour_start:
  name: "Salon - Godzina Start"
  unit_of_measurement: "h"
  min: 0
  max: 23.5
  step: 0.5
  icon: mdi:clock-start
  mode: slider
  restore: true

input_number_salon_hour_end:
  name: "Salon - Godzina End"
  unit_of_measurement: "h"
  min: 0
  max: 23.5
  step: 0.5
  icon: mdi:clock-end
  mode: slider
  restore: true

