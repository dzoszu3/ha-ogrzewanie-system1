# Automacja Ogrzewania - Home Assistant
# Plik: /config/automations.yaml

# ====================
# SALON
# ====================

- id: heating_salon_control
  alias: "Salon - Sterowanie ogrzewaniem"
  description: "Kontrola temperatury w salonie"
  trigger:
    - platform: time_pattern
      minutes: "/5"
  action:
    - service: switch.turn_on
      data:
        entity_id: switch.ogrzewanie_zawory_switch_4
      enabled: >
        {% set current_temp = states('sensor.ths_salon_temperatura') | float(20) %}
        {% set current_hour = now().hour + (now().minute / 60) %}
        {% set hour_start = states('input_number.input_number_salon_hour_start') | float(17) %}
        {% set hour_end = states('input_number.input_number_salon_hour_end') | float(24) %}
        {% set temp_day = states('input_number.input_number_salon_temp_day') | float(24) %}
        {% set temp_night = states('input_number.input_number_salon_temp_night') | float(22) %}
        {% if (current_hour >= hour_start or current_hour < hour_end) %}
          {% set target_temp = temp_day %}
        {% else %}
          {% set target_temp = temp_night %}
        {% endif %}
        {{ current_temp < target_temp }}
    - service: switch.turn_off
      data:
        entity_id: switch.ogrzewanie_zawory_switch_4
      enabled: >
        {% set current_temp = states('sensor.ths_salon_temperatura') | float(20) %}
        {% set current_hour = now().hour + (now().minute / 60) %}
        {% set hour_start = states('input_number.input_number_salon_hour_start') | float(17) %}
        {% set hour_end = states('input_number.input_number_salon_hour_end') | float(24) %}
        {% set temp_day = states('input_number.input_number_salon_temp_day') | float(24) %}
        {% set temp_night = states('input_number.input_number_salon_temp_night') | float(22) %}
        {% if (current_hour >= hour_start or current_hour < hour_end) %}
          {% set target_temp = temp_day %}
        {% else %}
          {% set target_temp = temp_night %}
        {% endif %}
        {{ current_temp >= target_temp }}

